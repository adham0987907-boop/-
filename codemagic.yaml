workflows:
  android-release:
    name: Android Release (APK + AAB)
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
      vars:
        PACKAGE_NAME: "com.example.vault_app"
      groups:
        - keystore_credentials   # add in CodeMagic dashboard

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$HOME/programs/flutter" > "$CM_BUILD_DIR/android/local.properties"

      - name: Get Flutter packages
        script: flutter pub get

      - name: Analyze code
        script: flutter analyze --no-fatal-infos

      - name: Run tests
        script: flutter test

      - name: Build APK (debug - for testing)
        script: |
          flutter build apk --debug \
            --build-name=1.0.$BUILD_NUMBER \
            --build-number=$BUILD_NUMBER

      - name: Build APK (release)
        script: |
          flutter build apk --release \
            --build-name=1.0.$BUILD_NUMBER \
            --build-number=$BUILD_NUMBER \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols

      - name: Build AAB (release - for Play Store)
        script: |
          flutter build appbundle --release \
            --build-name=1.0.$BUILD_NUMBER \
            --build-number=$BUILD_NUMBER \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/bundle/release/app-release.aab
      - build/app/outputs/symbols/

    publishing:
      email:
        recipients:
          - your@email.com          # ← غير الإيميل ده
        notify:
          success: true
          failure: true
